name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint & Format
        run: bun run lint

      - name: Build packages
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Run Tests
        # Use 'bun run test' (Vitest) to exclude Playwright E2E tests
        run: bun run test

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build Go CLI
        run: go build -v -ldflags "-X main.version=$(git describe --tags --always --dirty)" ./cmd/whisper/

      - name: Test Go Crypto
        run: go test -v ./internal/...
